    <div class="lhead">
        <h3 class="title-section2">Ubah Profile Siswa</h3>
        <h6 class="title-sub-section">Mohon teliti dalam mengisi profil.</h6>
    </div>

    <div class="lbody">
        <div class="lcard-blue">
            <div class="lcard-head">
                <div class="form-step">
                    <span data-form-step="true">
                        <p>1</p>
                    </span>
                    <span data-step-strep="false"></span>
                    <span data-form-step="false">
                        <p>2</p>
                    </span>
                    <span data-step-strep="false"></span>
                    <span data-form-step="false">
                        <p>3</p>
                    </span>
                    <span data-step-strep="false"></span>
                    <span data-form-step="false">
                        <p>4</p>
                    </span>
                </div>
            </div>
            <div class="lcard-body">
                <div class="row">
                    <div class="col">
                        <form class="domisili-form" action="">
                            <div class="row">
                                <div class="col-lg-4">
                                    <div class="lform-group">
                                        <label for="">Nama Lengkap</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="Masukkan Nama Lengkap">
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <div class="lform-group">
                                        <label for="">Email</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="contoh : emailkamu@gmail.com">
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <div class="lform-group">
                                        <label for="">No. Telp</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="contoh : 08xxxxxxxx">
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <div class="lform-group">
                                        <label for="">Tempat Lahir</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="contoh : Bantul">
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <div class="lform-group">
                                        <label for="">Tanggal Lahir</label>
                                        <input class="form-control" type="date" name="" id="">
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <div class="lform-group">
                                        <label for="">NISN</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="masukkan NISN">
                                    </div>
                                </div>
                                <div class="col-lg-6">
                                    <div class="lform-group">
                                        <label for="">NIK</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="masukkan NIK sesuai KK">
                                    </div>
                                </div>
                                <div class="col-lg-6">
                                    <div class="lform-group">
                                        <label for="">No. KK</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="masukkan no.kk sesuai KK">
                                    </div>
                                </div>
                                <div class="col text-center">
                                    <a href="profile.html" class="btn lbtn-yellow-solid rounded-pill">Kembali</a>
                                    <a href="ubahProfileSiswa2.html"
                                        class="btn lbtn-blue-solid rounded-pill ms-3">Selanjutnya</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
