    <div class="lhead">
        <h3 class="title-section2">Ubah Profile Siswa</h3>

    </div>

    <div class="lbody">
        <div class="lcard-blue">
            <div class="lcard-head">
                <div class="form-step">
                    <span data-form-step="true">
                        <p>1</p>
                    </span>
                    <span data-step-strep="true"></span>
                    <span data-form-step="true">
                        <p>2</p>
                    </span>
                    <span data-step-strep="false"></span>
                    <span data-form-step="false">
                        <p>3</p>
                    </span>
                    <span data-step-strep="false"></span>
                    <span data-form-step="false">
                        <p>4</p>
                    </span>
                </div>
            </div>
            <div class="lcard-body">
                <div class="row">
                    <div class="col">
                        <form class="domisili-form" action="">
                            <div class="row">
                                <div class="col-lg-4">
                                    <div class="lform-group">
                                        <label for="">Provinsi</label>
                                        <select class="form-select" name="" id="">
                                            <option value="" selected disabled>pilih provinsi ....</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <div class="lform-group">
                                        <label for="">Kab. / Kota</label>
                                        <select class="form-select" name="" id="">
                                            <option value="" selected disabled>pilih kabupaten / kota ....</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <div class="lform-group">
                                        <label for="">Kecamatan</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="masukkan kecamatan">
                                    </div>
                                </div>
                                <div class="col-lg-6">
                                    <div class="lform-group">
                                        <label for="">Desa / Kelurahan</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="masukkan desa / keluarahan">
                                    </div>
                                </div>
                                <div class="col-lg-6">
                                    <div class="lform-group">
                                        <label for="">Alamat</label>
                                        <input class="form-control" type="text" name="" id=""
                                            placeholder="masukkan alamat lengkap">
                                    </div>
                                </div>
                                <div class="col text-center">
                                    <a href="ubahProfileSiswa.html"
                                        class="btn lbtn-yellow-solid rounded-pill">Kembali</a>
                                    <a href="ubahProfileSiswa3.html"
                                        class="btn lbtn-blue-solid rounded-pill ms-3">Selanjutnya</a>
                                </div>
                            </div>
